<h1>Students</h1>

@for (student of students; track student.id) { <!-- Lists out the students name, id and course from the array -->
  <li>{{student.name}}</li>
  <li>{{student.id}}</li>
  <li>{{student.course}}</li>
  <br>
}

<h1>Weather in Galway</h1>

<p>{{weather[0].main}}, {{weather[0].description}}</p> <!-- Reads in the description from weather -->
